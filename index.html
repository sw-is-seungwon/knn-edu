<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨무학을 위한 기계학습 데이터 생성기✨</title>
    <style>
        :root {
            --primary-color: #feb6ae;
            --bg-color: #FFF0F2;
            --card-color: #FFFFFF;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Malgun Gothic', sans-serif; }
        body { background-color: var(--bg-color); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 15px; }
        
        /* 모바일 중심 크기 설정 */
        .container { background: var(--card-color); width: 100%; max-width: 430px; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h1 { font-size: 1.4rem; text-align: center; margin-bottom: 20px; color: #333; }

        /* 💡 안내 문구 박스 출력 */
        .notice-box { background-color: #EBF3FC; border-left: 4px solid var(--primary-color); padding: 12px; border-radius: 6px; margin-bottom: 20px; font-size: 0.85rem; color: #444; line-height: 1.5; }
        .notice-box strong { color: var(--primary-color); }
        
        /* 입력 칸 스타일 지정 */
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.85rem; color: #666; margin-bottom: 6px; font-weight: bold; }
        input { width: 100%; padding: 12px; border: 1px solid #DDD; border-radius: 10px; font-size: 1rem; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--primary-color); }
        .range-group { display: flex; gap: 10px; }
        
        /* 버튼 크기 및 기본 설정 */
        button { width: 100%; padding: 14px; background-color: var(--primary-color); color: white; border: none; border-radius: 10px; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-top: 10px; box-shadow: 0 4px 10px rgba(74,144,226,0.3); }
        button:active { transform: scale(0.98); }
        
        /* 결과 출력 영역 */
        .result-area { margin-top: 25px; border-top: 2px dashed #EEE; padding-top: 20px; display: none; }
        .result-title { font-size: 1.1rem; margin-bottom: 15px; color: #333; font-weight: bold; }
        .data-list { max-height: 250px; overflow-y: auto; border: 1px solid #EEE; border-radius: 10px; padding: 10px; background: #FAFBFD; }
        
        /* 데이터 좌표 및 모양 지정 */
        .data-item { display: flex; align-items: center; justify-content: space-between; padding: 8px 10px; border-bottom: 1px solid #F0F0F0; font-size: 0.95rem; }
        .data-item:last-child { border-bottom: none; }
        .marker-info { display: flex; align-items: center; gap: 10px; }
        
        /* 데이터 모양 별 도형 모양 정의하기 */
        .shape { width: 14px; height: 14px; display: inline-block; }
        .shape.circle { border-radius: 50%; }
        .shape.square { border-radius: 0; }
        .shape.triangle { width: 0; height: 0; border-left: 7px solid transparent; border-right: 7px solid transparent; border-bottom: 14px solid red; background: none !important; }
    </style>
</head>
<body>

<div class="container">
    <h1> 🔎기계학습 데이터 생성기🔎</h1>

    <div class="notice-box">
        <strong>💡 활동 안내</strong><br>
        1. 데이터 개수, 범위를 설정하고 버튼을 누르세요.<br>
        2. 생성된 카테고리의 좌표를 활동지에 옮겨 적습니다.<br>
        3. 화면 속 데이터의 카테고리를 찾아봅시다!
    </div>
    
    <div class="input-group">
        <label>총 데이터 개수</label>
        <input type="number" id="totalCount" value="15" min="1">
    </div>
    
    <div class="input-group">
        <label>카테고리 수 (1 ~ 3)</label>
        <input type="number" id="categoryCount" value="3" min="1" max="3">
    </div>
    
    <div class="input-group">
        <label>X축 범위 (최소 ~ 최대)</label>
        <div class="range-group">
            <input type="number" id="minX" value="1" placeholder="최소">
            <input type="number" id="maxX" value="30" placeholder="최대">
        </div>
    </div>
    
    <div class="input-group">
        <label>Y축 범위 (최소 ~ 최대)</label>
        <div class="range-group">
            <input type="number" id="minY" value="1" placeholder="최소">
            <input type="number" id="maxY" value="30" placeholder="최대">
        </div>
    </div>
    
    <button onclick="generateData()">🎲 데이터 생성하기!</button>
    
    <div class="result-area" id="resultArea">
        <div class="result-title">생성된 데이터 (총 <span id="actualCount">0</span>개)</div>
        <div class="data-list" id="dataList"></div>
    </div>
</div>

<script>
    // 카테고리별 스타일 정의 (색상 및 모양 CSS 클래스)
    const categoriesConfig = [
        { name: 'A', color: '#FF5A5F', shape: 'circle' },   // 빨간 원
        { name: 'B', color: '#4A90E2', shape: 'square' },   // 파란 네모
        { name: 'C', color: '#2CA58D', shape: 'triangle' }  // 초록 세모
    ];

    function generateData() {
        const totalCount = parseInt(document.getElementById('totalCount').value);
        const catCount = Math.min(3, Math.max(1, parseInt(document.getElementById('categoryCount').value)));
        const minX = parseInt(document.getElementById('minX').value);
        const maxX = parseInt(document.getElementById('maxX').value);
        const minY = parseInt(document.getElementById('minY').value);
        const maxY = parseInt(document.getElementById('maxY').value);

        // 예외 처리
        const maxPossiblePoints = (maxX - minX + 1) * (maxY - minY + 1);
        if (totalCount > maxPossiblePoints) {
            alert(`입력하신 범위에서 중복 없이 생성할 수 있는 최대 데이터 개수는 ${maxPossiblePoints}개입니다. 범위를 넓히거나 개수를 줄여주세요.`);
            return;
        }

        const usedPositions = new Set();
        const dataList = [];

        // 카테고리별 분할 계산
        const baseCount = Math.floor(totalCount / catCount);
        let remainder = totalCount % catCount;

        for (let i = 0; i < catCount; i++) {
            let countForThisCat = baseCount + (remainder > 0 ? 1 : 0);
            remainder--;

            for (let j = 0; j < countForThisCat; j++) {
                let x, y, key;
                do {
                    x = Math.floor(Math.random() * (maxX - minX + 1)) + minX;
                    y = Math.floor(Math.random() * (maxY - minY + 1)) + minY;
                    key = `${x},${y}`;
                } while (usedPositions.has(key));

                usedPositions.add(key);
                // 중요: 확실하게 매핑된 카테고리 객체를 넘겨줍니다.
                dataList.push({ x: x, y: y, category: categoriesConfig[i] });
            }
        }

        // 🔄 카테고리 이름순으로 정렬 후, 동일 카테고리 내에서는 x값 기준으로 한 번 더 정렬!
        dataList.sort((a, b) => {
            if (a.category.name !== b.category.name) {
                return a.category.name.localeCompare(b.category.name);
            }
            return a.x - b.x || a.y - b.y;
        });

        // UI 렌더링 호출
        displayResults(dataList);
    }

    function displayResults(data) {
        const resultArea = document.getElementById('resultArea');
        const dataListDiv = document.getElementById('dataList');
        const actualCountSpan = document.getElementById('actualCount');
        
        dataListDiv.innerHTML = '';
        actualCountSpan.innerText = data.length;

        data.forEach((item, index) => {
            const itemDiv = document.createElement('div');
            itemDiv.className = 'data-item';

            // 도형 스타일 개별 지정
            let shapeStyle = `background-color: ${item.category.color};`;
            if (item.category.shape === 'triangle') {
                shapeStyle = `border-bottom-color: ${item.category.color};`;
            }

            itemDiv.innerHTML = `
                <span style="font-weight: bold; color: #888;">#${index + 1}</span>
                <div class="marker-info">
                    <span class="shape ${item.category.shape}" style="${shapeStyle}"></span>
                    <span> ${item.category.name}</span>
                </div>
                <strong style="color: #333;">(${item.x}, ${item.y})</strong>
            `;
            dataListDiv.appendChild(itemDiv);
        });

        resultArea.style.display = 'block';
    }
</script>
</body>
</html>
